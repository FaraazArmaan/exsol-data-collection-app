<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in - ExSol</title>
    <link rel="stylesheet" href="/assets/css/base.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div class="container">
      <h1>ExSol Data Collection</h1>
      <p class="muted">Sign in to continue.</p>

      <div class="card">
        <h2>Sign in with Google</h2>
        <p class="muted" id="google-status">Loading...</p>
        <div id="google-signin-button"></div>

        <div class="divider">or use email and password</div>

        <form id="email-form" autocomplete="on">
          <label>Email
            <input type="email" name="email" required autocomplete="username" />
          </label>
          <label>Password
            <input type="password" name="password" required autocomplete="current-password" />
          </label>
          <div style="margin-top: 1rem;">
            <button class="primary" type="submit">Sign in</button>
          </div>
        </form>

        <div class="error" id="error"></div>
      </div>
    </div>

    <script type="module">
      import { postJSON, fetchMe, fetchConfig } from '/assets/js/api.js';

      const errorBox = document.getElementById('error');
      const googleStatus = document.getElementById('google-status');

      function showError(msg) { errorBox.textContent = msg; }

      function friendlyError(code) {
        switch (code) {
          case 'unknown_user': return "This email isn't registered. Ask your admin to add you.";
          case 'user_disabled': return 'This account has been disabled.';
          case 'invalid_password': return 'Wrong password.';
          case 'no_password_set': return 'No password set. Try Google sign-in.';
          case 'email_not_verified': return 'Email not yet verified.';
          case 'invalid_token': return 'Sign-in token was rejected.';
          case 'missing_credentials': return 'Please enter both email and password.';
          case 'misconfigured': return 'Google sign-in is not configured yet.';
          default: return code || 'Sign in failed.';
        }
      }

      async function gotoUserHome() {
        const { user } = await fetchMe();
        if (!user) return;
        window.location.href = user.isAdmin ? '/admin.html' : '/me.html';
      }

      fetchMe().then(({ user }) => {
        if (user) {
          window.location.href = user.isAdmin ? '/admin.html' : '/me.html';
        }
      });

      const cfg = await fetchConfig();
      if (!cfg.googleClientId) {
        googleStatus.textContent = 'Google sign-in not configured. Set GOOGLE_OAUTH_CLIENT_ID in .env to enable.';
      } else {
        const ready = () => {
          if (typeof google === 'undefined' || !google.accounts?.id) {
            setTimeout(ready, 100);
            return;
          }
          google.accounts.id.initialize({
            client_id: cfg.googleClientId,
            callback: async (resp) => {
              showError('');
              const { ok, data } = await postJSON('/api/auth/google', { idToken: resp.credential });
              if (ok) {
                window.location.href = data.redirectTo || '/me.html';
              } else {
                showError(friendlyError(data.error));
              }
            },
          });
          google.accounts.id.renderButton(
            document.getElementById('google-signin-button'),
            { theme: 'outline', size: 'large', text: 'signin_with' },
          );
          googleStatus.textContent = '';
        };
        ready();
      }

      document.getElementById('email-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        showError('');
        const form = e.target;
        const email = form.email.value.trim();
        const password = form.password.value;
        const { ok, data } = await postJSON('/api/auth/email/login', { email, password });
        if (ok) {
          window.location.href = data.redirectTo || '/me.html';
        } else {
          showError(friendlyError(data.error));
        }
      });
    </script>
  </body>
</html>
