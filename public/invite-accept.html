<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accept invite - ExSol</title>
    <link rel="stylesheet" href="/assets/css/base.css" />
    <script>(function(){try{var t=localStorage.getItem('exsol-theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t)}catch(e){}})();</script>
    <script type="module" src="/assets/js/theme.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div class="container">
      <div style="display:flex;justify-content:flex-end;margin-bottom:0.5rem;">
        <button id="theme-toggle" class="theme-toggle" type="button">☾</button>
      </div>
      <h1>Accept your invitation</h1>
      <p class="muted" id="intro">Loading…</p>

      <div class="card" id="form-card" hidden>
        <p>You've been invited to join <strong id="ws-name"></strong> as <strong id="role-name"></strong>.</p>
        <p class="muted">Email: <span id="invite-email"></span></p>

        <div id="google-section" hidden>
          <h3 style="margin:1rem 0 0.5rem;">Continue with Google</h3>
          <p class="muted" id="google-status">Loading…</p>
          <div id="google-signin-button"></div>
          <div class="divider" style="margin: 1.5rem 0; text-align:center; color: var(--muted); font-size: 0.85rem;">or create a password</div>
        </div>

        <form id="accept-form" autocomplete="on">
          <label>Your name
            <input id="field-name" type="text" required autocomplete="name" />
          </label>
          <label>Create a password
            <input id="field-password" type="password" required minlength="8" autocomplete="new-password" />
          </label>
          <div style="margin-top: 1rem;">
            <button class="primary" type="submit">Create account &amp; accept</button>
          </div>
        </form>

        <div class="error" id="error"></div>
      </div>

      <div class="card" id="error-card" hidden>
        <h2 id="error-heading">Invite unavailable</h2>
        <p id="error-detail" class="muted"></p>
      </div>
    </div>

    <script type="module">
      import { postJSON, getJSON, fetchConfig } from '/assets/js/api.js';

      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const intro = document.getElementById('intro');
      const formCard = document.getElementById('form-card');
      const errorCard = document.getElementById('error-card');
      const errorHeading = document.getElementById('error-heading');
      const errorDetail = document.getElementById('error-detail');
      const errorBox = document.getElementById('error');

      function showError(heading, detail) {
        formCard.hidden = true;
        errorCard.hidden = false;
        errorHeading.textContent = heading;
        errorDetail.textContent = detail;
      }

      if (!token) {
        showError('Missing token', 'This link is incomplete. Ask your inviter to send the link again.');
      } else {
        try {
          const info = await getJSON(`/api/invites/${encodeURIComponent(token)}`);
          if (info.error) {
            showError('Invite not found', 'The link may have been mistyped or the invite was deleted.');
          } else if (!info.usable) {
            const s = info.status;
            const heading = s === 'expired' ? 'Invite expired' :
              s === 'accepted' ? 'Already accepted' :
              s === 'revoked' ? 'Invite revoked' : 'Invite unavailable';
            const detail = s === 'expired' ? 'This invite is older than 7 days. Ask for a fresh one.' :
              s === 'accepted' ? 'You\'ve already accepted this invite. Sign in normally.' :
              s === 'revoked' ? 'The inviter revoked this invite.' : 'Status: ' + s;
            showError(heading, detail);
          } else {
            intro.textContent = '';
            formCard.hidden = false;
            document.getElementById('ws-name').textContent = info.workspaceName;
            document.getElementById('role-name').textContent = info.role;
            document.getElementById('invite-email').textContent = info.email;
            await wireGoogleButton(info.email);
          }
        } catch (err) {
          showError('Could not load invite', String(err.message || err));
        }
      }

      async function wireGoogleButton(inviteEmail) {
        const section = document.getElementById('google-section');
        const status = document.getElementById('google-status');
        const cfg = await fetchConfig();
        if (!cfg.googleClientId) {
          // No Google client configured — leave the section hidden, password path is the only option.
          return;
        }
        section.hidden = false;
        const ready = () => {
          if (typeof google === 'undefined' || !google.accounts?.id) {
            setTimeout(ready, 100);
            return;
          }
          google.accounts.id.initialize({
            client_id: cfg.googleClientId,
            callback: async (resp) => {
              status.textContent = 'Accepting…';
              status.className = 'muted';
              const { ok, data } = await postJSON(
                `/api/invites/${encodeURIComponent(token)}/accept-google`,
                { idToken: resp.credential },
              );
              if (ok) {
                window.location.href = data.redirectTo || '/me.html';
                return;
              }
              if (data.error === 'email_mismatch') {
                status.textContent = `That invite is for ${inviteEmail}, but you signed in as ${data.googleEmail}. Use that email in Google, or create a password below.`;
                status.className = 'error-text';
              } else {
                status.textContent = data.detail || data.error || 'Google sign-in failed.';
                status.className = 'error-text';
              }
            },
          });
          google.accounts.id.renderButton(
            document.getElementById('google-signin-button'),
            { theme: 'outline', size: 'large', text: 'continue_with' },
          );
          status.textContent = '';
        };
        ready();
      }

      document.getElementById('accept-form').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        errorBox.textContent = '';
        const name = document.getElementById('field-name').value.trim();
        const password = document.getElementById('field-password').value;
        if (!name || password.length < 8) {
          errorBox.textContent = 'Please provide a name and a password of at least 8 characters.';
          return;
        }
        const { ok, data } = await postJSON(
          `/api/invites/${encodeURIComponent(token)}/accept`,
          { name, password },
        );
        if (!ok) {
          errorBox.textContent = data.detail || data.error || 'Could not accept the invite.';
          return;
        }
        window.location.href = data.redirectTo || '/me.html';
      });
    </script>
  </body>
</html>
