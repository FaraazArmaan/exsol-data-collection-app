[build]
  publish = "public"
  command = "echo 'static frontend - no build step'"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  framework = "#static"
  publish = "public"
  port = 8888
  targetPort = 3999

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
