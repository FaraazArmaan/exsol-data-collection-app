[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  # Tell netlify dev explicitly how to start the SPA — otherwise its framework
  # detector picks `npm run build` (which is a one-shot tsc+vite build) and
  # exits the moment that succeeds, shutting Netlify Dev down.
  command = "npx vite"
  targetPort = 5173
  port = 8888
  publish = "dist"
  framework = "#custom"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "GOOGLE_OAUTH_CLIENT_ID"
  # Force npm to install devDependencies even when NODE_ENV=production.
  # The build script (`tsc --noEmit && vite build`) relies on dev-only
  # binaries (tsc, vite, @vitejs/plugin-react) that would otherwise be
  # skipped → exit code 127 (command not found) on Netlify.
  NPM_FLAGS = "--include=dev"

[functions]
  # Don't bundle native modules — esbuild can pull in their JS wrappers
  # but can't ship the platform-specific .node binaries. Listed modules
  # are installed into the function's node_modules at deploy time so
  # their prebuild binaries are present at runtime.
  external_node_modules = ["@node-rs/argon2", "@node-rs/argon2-linux-x64-gnu", "sharp"]

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), browsing-topics=()"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
