<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product Manager UI/UX options</title><link rel="stylesheet" href="/exsol-uiux-lab.css">
  <style>
    .intro{max-width:70ch;color:var(--muted)}.decision-tabs{display:flex;gap:8px;overflow-x:auto;margin:24px 0 18px;padding-bottom:4px}.decision-tab{min-height:42px;padding:0 14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);color:var(--text);font:inherit;white-space:nowrap}.decision-tab[aria-selected=true]{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,var(--surface));font-weight:800}.decision-title{margin:0;font-size:22px}.decision-copy{margin:7px 0 18px;color:var(--muted)}.options{display:grid;grid-template-columns:1fr;gap:20px}.option{display:grid;grid-template-columns:minmax(0,1fr) 230px;column-gap:20px;align-items:start;padding:18px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface)}.option.selected{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}.option h2,.option>p,.option>button,.option>.desktop,.option>.ratio-label:first-of-type{grid-column:1}.option h2{margin:0;font-size:18px}.option>p{min-height:0;margin:8px 0 16px;color:var(--muted);font-size:14px;line-height:1.45}.option button{width:max-content;min-width:120px;min-height:42px;margin-top:14px;padding:0 14px;border:1px solid var(--line);border-radius:7px;background:var(--elevated);color:var(--text);font:inherit;font-weight:700}.option.selected button{border-color:var(--accent);background:var(--accent);color:var(--on-accent)}.ratio-label{margin:0 0 7px;color:var(--muted);font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}.desktop{aspect-ratio:16/9;overflow:hidden;border:1px solid var(--line);border-radius:8px;background:#111610}.option>.phone-wrap{grid-column:2;grid-row:1/7;display:flex;align-items:center;justify-content:center;margin:0}.option>.phone-wrap::before{content:'Phone · 9:16';position:absolute;align-self:flex-start;color:var(--muted);font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}.phone{width:70%;aspect-ratio:9/16;margin-top:22px;overflow:hidden;border:6px solid #090b09;border-radius:18px;background:#111610;font-size:clamp(7px,.7vw,10px);box-shadow:0 12px 25px rgba(0,0,0,.25)}.d-top,.p-top{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #374035;color:#d8ddd4}.d-top{height:12%;padding:0 4%;font-size:.85em;background:#20281f}.d-body{padding:3.5%;font-size:clamp(7px,.8vw,12px)}.d-title{font-size:1.35em;font-weight:800;color:#f3f6f0}.d-sub{margin-top:3px;color:#96a094}.d-tabs{display:flex;gap:1em;margin:5% 0 3%;border-bottom:1px solid #374035;color:#96a094}.d-tabs b{padding-bottom:.6em;color:#dce3d7;border-bottom:2px solid #bed7ad}.alert{display:flex;justify-content:space-between;gap:5px;margin-bottom:3%;padding:2.2%;border:1px solid #728469;border-radius:5px;background:#232d20;color:#dce3d7}.alert em{font-style:normal;color:#c7e1b5}.filters{display:grid;grid-template-columns:.9fr 1fr 1.8fr .6fr;gap:4px;margin-bottom:3%}.filter,.mini-button{padding:.55em;border:1px solid #3a4438;border-radius:4px;background:#1c231b;color:#96a094}.mini-button{color:#dce3d7}.table{border:1px solid #374035;border-radius:5px;overflow:hidden}.row{display:grid;grid-template-columns:.45fr 1.45fr 1fr .8fr .75fr;gap:4px;padding:.65em;border-top:1px solid #30392f;color:#aab3a5}.row:first-child{border-top:0}.row.head{background:#20281f;color:#96a094;font-size:.8em;text-transform:uppercase}.row strong{color:#edf1e9}.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}.tile{min-height:52px;padding:7px;border:1px solid #374035;border-radius:5px;background:#20281f;color:#dce3d7}.tile span{display:block;margin-top:5px;color:#96a094}.split{display:grid;grid-template-columns:1.2fr .8fr;gap:5px}.inspector{padding:7px;border:1px solid #65755d;border-radius:5px;background:#20281f;color:#dce3d7}.form-sections{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}.section{min-height:32px;padding:6px;border:1px solid #374035;border-radius:4px;background:#20281f;color:#dce3d7}.wizard{padding:8px;border:1px solid #65755d;border-radius:5px;background:#20281f;color:#dce3d7}.steps{display:flex;gap:3px;margin:8px 0}.step{height:5px;flex:1;background:#3a4438;border-radius:4px}.step.active{background:#bed7ad}.field{height:12px;margin-top:6px;border:1px solid #3a4438;border-radius:3px}.long-form{display:grid;gap:5px}.p-top{height:13%;padding:0 8%;font-size:1em;background:#20281f}.p-body{padding:8%}.p-title{font-size:1.4em;font-weight:800;color:#eef3eb}.p-search{margin:7% 0;padding:7%;border:1px solid #3a4438;border-radius:4px;color:#96a094}.p-card{display:flex;gap:5px;margin-top:5px;padding:6px;border:1px solid #374035;border-radius:4px;background:#20281f;color:#e4e9df}.p-thumb{width:21%;aspect-ratio:1;border-radius:3px;background:#3c4939}.p-line{height:4px;margin-top:4px;border-radius:3px;background:#465143}.p-scroll{display:flex;gap:3px;overflow:hidden;margin:6% 0}.p-scroll i{min-width:30%;height:22px;border:1px solid #374035;border-radius:3px;background:#20281f}.summary{margin-top:18px;padding:14px;border-left:3px solid var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent)}.summary p{margin:5px 0 0;color:var(--muted)}@media(max-width:760px){.option{grid-template-columns:1fr}.option>.phone-wrap{grid-column:1;grid-row:auto;justify-content:flex-start;margin-top:14px}.phone{width:180px}.option>.phone-wrap::before{position:static;margin-right:12px}.option>.ratio-label:first-of-type{margin-top:6px}}@media(max-width:560px){.lab{padding-inline:14px}.phone{width:150px}}
  </style>
  <style>
    .option-controls{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 20px}.option-control{min-height:112px;padding:14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);color:var(--text);font:inherit;text-align:left;cursor:pointer}.option-control strong,.option-control small{display:block}.option-control small{margin-top:6px;color:var(--muted);line-height:1.35}.option-control[aria-pressed=true]{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent);background:color-mix(in srgb,var(--accent) 10%,var(--surface))}.live-previews{display:grid;grid-template-columns:minmax(0,1fr) 270px;gap:18px;align-items:start}.live-preview{padding:14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface)}.live-preview>p{margin:0 0 8px;color:var(--muted);font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}.live-preview .phone-wrap{display:flex;justify-content:center;margin:0}.live-preview .phone-wrap::before{display:none}.live-preview .phone{width:190px;max-width:100%;margin:0;font-size:10px}.live-preview .desktop{width:100%}.live-note{margin:12px 0 0;color:var(--muted);font-size:13px}.decision-actions{display:flex;justify-content:flex-end;margin-top:18px}.decision-actions button{min-height:44px;padding:0 16px;border:0;border-radius:7px;background:var(--accent);color:var(--on-accent);font:inherit;font-weight:800;cursor:pointer}.demo-action{cursor:pointer}.demo-action:hover{filter:brightness(1.1)}@media(max-width:760px){.option-controls{grid-template-columns:1fr}.live-previews{grid-template-columns:1fr}.live-preview .phone{width:180px}.live-preview--phone{justify-self:center;width:min(100%,300px)}}
  </style>
</head>
<body>
  <main class="lab">
    <p class="lab-eyebrow">EXSOL · PRODUCT MANAGER · DECISION PREVIEW</p>
    <h1>Product Manager: choose each interaction model</h1>
    <p class="intro">Use the four tabs below. Each tab compares A, B, and C directly with a 16:9 desktop screen and a phone-ratio screen. Select the version you want for that decision.</p>
    <div id="tabs" class="decision-tabs" role="tablist" aria-label="Product Manager decisions"></div>
    <section id="decision" aria-live="polite"></section>
    <section id="summary" class="summary"></section>
  </main>
  <script>
    const decisions=[
      {key:'landing',title:'1. Catalog landing',copy:'What should a staff member see immediately after opening Product Manager?',options:[
        ['A','Catalog + attention strip','The full searchable catalog stays dominant. A small strip flags only actionable drafts or stock signals.'],
        ['B','Dashboard first','Catalog health KPIs and charts come before the searchable product records.'],
        ['C','Pure catalog table','Open straight into the table. Maximum density, but no operational signal.']
      ]},
      {key:'density',title:'2. Desktop density',copy:'How should the catalog use a wide desktop workspace?',options:[
        ['A','Adaptive data table','Full-width table with concise columns; lower-value columns collapse on smaller widths.'],
        ['B','Product cards','Visual browsing cards replace row scanning.'],
        ['C','Split inspector','A table stays visible beside a persistent selected-product detail pane.']
      ]},
      {key:'edit',title:'3. Product edit flow',copy:'How should the many product fields stay manageable?',options:[
        ['A','Structured sections','Named basics, pricing, inventory, media, variants, and commerce sections with one save action.'],
        ['B','Step-by-step wizard','A guided five-step product setup.'],
        ['C','Long single form','All fields in one continuous form.']
      ]},
      {key:'phone',title:'4. Phone behaviour',copy:'How should Product Manager work on a touch device?',options:[
        ['A','Search + result cards','Search and filters first; compact product cards second; one clear add action.'],
        ['B','Horizontal table','Preserve desktop columns in a swipeable table.'],
        ['C','Dashboard cards','Catalog statistics lead; product finding comes later.']
      ]}
    ];
    const state={landing:'A',density:'A',edit:'A',phone:'A'};let active='landing';
    const desktopRows='<div class="table"><div class="row head"><span>Img</span><span>Name</span><span>Price</span><span>Stock</span><span>Status</span></div><div class="row"><span>■</span><strong>SC Wax</strong><span>₹199</span><span>24</span><span>Active</span></div><div class="row"><span>■</span><strong>Beard Oil</strong><span>₹9.50</span><span>27</span><span>Active</span></div></div>';
    function desktop(kind,opt){const header='<div class="d-top"><b>Papa’s Saloon</b><span>Faraaz ⌄</span></div><div class="d-body"><div class="d-title">Product Manager</div><div class="d-sub">Catalog of products and services</div><div class="d-tabs"><b>All products</b><span>Active</span><span>Draft</span></div>';const filter='<div class="filters"><span class="filter">Type</span><span class="filter">Category</span><span class="filter">⌕ Search products</span><span class="mini-button">+ Add</span></div>';let body='';if(kind==='landing'){body=opt==='A'?'<div class="alert"><span><b>Needs attention</b><br>1 draft missing a price</span><em>Review</em></div>'+filter+desktopRows:opt==='B'?'<div class="card-grid"><div class="tile"><b>15</b><span>Active</span></div><div class="tile"><b>3</b><span>Low stock</span></div><div class="tile"><b>1</b><span>Draft</span></div></div>'+filter+desktopRows:filter+desktopRows}if(kind==='density'){body=opt==='A'?filter+desktopRows:opt==='B'?filter+'<div class="card-grid"><div class="tile"><b>SC Wax</b><span>₹199 · 24 in stock</span></div><div class="tile"><b>Beard Oil</b><span>₹9.50 · 27 in stock</span></div><div class="tile"><b>Kit</b><span>₹25 · 25 in stock</span></div></div>':'<div class="split"><div>'+filter+desktopRows+'</div><aside class="inspector"><b>SC Wax</b><br><br>₹199<br>24 available<br><br>Category<br>Hair care</aside></div>'}if(kind==='edit'){body=opt==='A'?'<div class="form-sections"><div class="section">Basics</div><div class="section">Pricing</div><div class="section">Inventory</div><div class="section">Media</div><div class="section">Variants</div><div class="section">Commerce</div></div><div class="alert"><span>All changes saved</span><em>Save product</em></div>':opt==='B'?'<div class="wizard"><b>Product setup · Step 2 of 5</b><div class="steps"><i class="step active"></i><i class="step active"></i><i class="step"></i><i class="step"></i><i class="step"></i></div><div class="field"></div><div class="field"></div><div class="field"></div></div>':'<div class="long-form"><div class="field"></div><div class="field"></div><div class="field"></div><div class="field"></div><div class="field"></div><div class="field"></div><div class="field"></div></div>'}if(kind==='phone'){body=filter+desktopRows}return '<div class="desktop">'+header+body+'</div>'}
    function phone(kind,opt){let content='';if(kind==='phone'){content=opt==='A'?'<div class="p-search">⌕ Search name, SKU, brand…</div><div class="p-card"><i class="p-thumb"></i><div><b>SC Wax</b><div class="p-line"></div><small>₹199 · 24 in stock</small></div></div><div class="p-card"><i class="p-thumb"></i><div><b>Beard Oil</b><div class="p-line"></div><small>₹9.50 · 27 in stock</small></div></div>':opt==='B'?'<div class="p-scroll"><i></i><i></i><i></i></div><div class="p-card"><div><b>SC Wax | ₹199 | 24</b><div class="p-line"></div></div></div>':'<div class="p-scroll"><i></i><i></i><i></i></div><div class="p-card"><div><b>15 products</b><small>3 need review</small></div></div>'}else if(kind==='edit'){content=opt==='A'?'<div class="p-scroll"><i></i><i></i><i></i></div><div class="p-card"><div><b>Pricing</b><div class="p-line"></div><div class="p-line"></div></div></div>':opt==='B'?'<div class="p-card"><div><b>Step 2 of 5</b><div class="p-line"></div><div class="p-line"></div></div></div>':'<div class="p-card"><div><b>Product form</b><div class="p-line"></div><div class="p-line"></div><div class="p-line"></div></div></div>'}else{content=opt==='A'?'<div class="p-search">⌕ Search products</div><div class="p-card"><div><b>Needs attention</b><small>1 draft missing a price</small></div></div>':opt==='B'?'<div class="p-card"><div><b>Catalog dashboard</b><small>15 active · 3 low stock</small></div></div>':'<div class="p-search">⌕ Search products</div><div class="p-card"><div><b>SC Wax</b><small>₹199 · Active</small></div></div>'}return '<div class="phone-wrap"><div class="phone"><div class="p-top"><b>Products</b><span>＋</span></div><div class="p-body"><div class="p-title">Catalog</div>'+content+'</div></div></div>'}
    window.setDecision=(key)=>{active=key;render()};window.selectOption=(key,letter)=>{state[key]=letter;render()};window.nextDecision=()=>{const index=decisions.findIndex(x=>x.key===active);active=decisions[(index+1)%decisions.length].key;render()};
    function render(){const d=decisions.find(x=>x.key===active);const chosen=state[d.key];const current=d.options.find(x=>x[0]===chosen);const next=decisions[(decisions.findIndex(x=>x.key===active)+1)%decisions.length];document.querySelector('#tabs').innerHTML=decisions.map(x=>`<button class="decision-tab" role="tab" aria-selected="${x.key===active}" onclick="window.setDecision('${x.key}')">${x.title}</button>`).join('');document.querySelector('#decision').innerHTML=`<h2 class="decision-title">${d.title}</h2><p class="decision-copy">${d.copy}</p><div class="option-controls">${d.options.map(([letter,title,copy])=>`<button class="option-control" type="button" onclick="window.selectOption('${d.key}','${letter}')" aria-pressed="${chosen===letter}"><strong>${letter} · ${title}</strong><small>${copy}</small></button>`).join('')}</div><div class="live-previews"><article class="live-preview"><p>Desktop · 16:9 · selected ${chosen}</p>${desktop(d.key,chosen)}<p class="live-note">${current[2]}</p></article><article class="live-preview live-preview--phone"><p>Phone · 9:16 · selected ${chosen}</p>${phone(d.key,chosen)}</article></div><div class="decision-actions"><button type="button" onclick="window.nextDecision()">Continue to ${next.title}</button></div>`;document.querySelector('#summary').innerHTML=`<strong>Selected: 1${state.landing}, 2${state.density}, 3${state.edit}, 4${state.phone}.</strong><p>Select A, B, or C to update both previews. Then use Continue to move to the next decision.</p>`}
    render();
  </script>
</body></html>
